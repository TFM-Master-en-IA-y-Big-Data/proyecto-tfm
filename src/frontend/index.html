<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CryptoPredict Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="card">
        <h1>CryptoPredict</h1>
        <p>Selecciona una moneda para predecir:</p>
        <select id="coinSelect">
            <option value="BTC">Bitcoin (BTC)</option>
            <option value="ETH">Ethereum (ETH)</option>
            <option value="SOL">Solana (SOL)</option>
            <option value="BNB">Binance Coin (BNB)</option>
            <option value="ADA">Cardano (ADA)</option>
        </select>
        <button onclick="obtenerPrediccion()">Predecir Tendencia</button>

        <div id="resultado" style="display: none;">
            <h2 id="resCoin"></h2>
            <p id="resTexto"></p>
            <p>Probabilidad: <span id="resProb"></span></p>
            <p>Riesgo: <span id="resRiesgo"></span></p>
            <canvas id="grafica"></canvas>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
